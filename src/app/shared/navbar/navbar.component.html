<nav class="navbar" [class.scrolled]="scrolled()">
  <div class="nav-inner container">
    <a routerLink="/" class="brand" (click)="closeMenu()">
      <span class="brand-icon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="20,4 36,34 4,34" fill="none" stroke="currentColor" stroke-width="2.5"/>
          <line x1="20" y1="4" x2="20" y2="34" stroke="currentColor" stroke-width="1.5"/>
          <line x1="4" y1="34" x2="36" y2="34" stroke="currentColor" stroke-width="2"/>
          <circle cx="20" cy="19" r="3" fill="currentColor"/>
        </svg>
      </span>
      <span class="brand-text">Sendero</span>
    </a>

    <ul class="nav-links" [class.open]="menuOpen()">
      @for (link of navLinks; track link.path) {
        <li>
          <a [routerLink]="link.path" routerLinkActive="active"
             (click)="closeMenu()">{{ link.label }}</a>
        </li>
      }
    </ul>

    <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen()" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
